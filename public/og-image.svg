<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="blob1" cx="20%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#2bb6f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2bb6f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="85%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#2bb6f6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2bb6f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="60%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#0d9fd8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0d9fd8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#2b2b2b"/>

  <!-- Blobs -->
  <rect width="1200" height="630" fill="url(#blob1)"/>
  <rect width="1200" height="630" fill="url(#blob2)"/>
  <rect width="1200" height="630" fill="url(#blob3)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="none" stroke="#2bb6f6" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Logo { M } -->
  <text x="600" y="240"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="110"
    font-weight="700"
    letter-spacing="-4"
    fill="#2bb6f6">{ M }</text>

  <!-- Divider -->
  <rect x="540" y="278" width="120" height="3" rx="2" fill="#2bb6f6" fill-opacity="0.6"/>

  <!-- Name -->
  <text x="600" y="348"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="1"
    fill="#ffffff">Marco De Demo</text>

  <!-- Role -->
  <text x="600" y="408"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    letter-spacing="0.5"
    fill="#8f9094">Fullstack Web Developer · React &amp; Laravel</text>

  <!-- Availability badge -->
  <rect x="468" y="460" width="264" height="40" rx="20" fill="#2bb6f620" stroke="#2bb6f650" stroke-width="1.5"/>
  <circle cx="496" cy="480" r="5" fill="#2bb6f6"/>
  <text x="510" y="480"
    dominant-baseline="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="600"
    fill="#2bb6f6">Disponibile per nuovi progetti</text>
</svg>
